    <path d="M74 258H344" stroke="#8EA4B2" stroke-width="20" stroke-linecap="round"/>
    <path d="M74 294H248" stroke="#5EEAD4" stroke-width="10" stroke-linecap="round"/>
    <path d="M284 112H350" stroke="#2563EB" stroke-width="13" stroke-linecap="round"/>
